<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Register - Grocery Store</title>
    <!-- Use main CSS imports to match site style -->
    <div th:replace="~{fragments/homepage-css-imports.html}"></div>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h2>Register</h2>
        <form th:action="@{/registration}" th:object="${userDto}" method="post">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" th:field="*{firstName}" class="form-control" placeholder="Enter your first name" required>
                <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-danger"></div>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" th:field="*{lastName}" class="form-control" placeholder="Enter your last name" required>
                <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-danger"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Enter your email" required>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></div>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Choose a username" required>
                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Enter your password" required>
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></div>
            </div>

            <div class="form-group">
                <label for="repeatPassword">Confirm Password</label>
                <input type="password" id="repeatPassword" th:field="*{repeatPassword}" class="form-control" placeholder="Confirm your password" required>
                <div th:if="${#fields.hasErrors('repeatPassword')}" th:errors="*{repeatPassword}" class="text-danger"></div>
            </div>

            <button type="submit" class="btn-auth">Register</button>

            <div class="auth-footer-text">
                <span>Or Register Using</span>
            </div>

            <div class="social-login">
                <a th:href="@{/oauth2/authorization/facebook}" class="social-item bg-fb">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a th:href="@{/oauth2/authorization/microsoft}" class="social-item bg-ms">
                    <i class="fab fa-windows"></i>
                </a>
                <a th:href="@{/oauth2/authorization/google}" class="social-item bg-go">
                    <i class="fab fa-google"></i>
                </a>
            </div>

            <div class="auth-footer-text mt-4">
                <span>Already have an account?</span>
                <a th:href="@{/login}">Log In</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
