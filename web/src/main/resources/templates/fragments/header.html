<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:fragment="header">
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container px-4 px-lg-5">

      <!-- Hamburger Button (Always Visible) -->
      <button class="navbar-toggler me-3" type="button" data-bs-toggle="collapse"
              data-bs-target="#navLinks" aria-controls="navLinks">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Brand -->
      <a class="navbar-brand" th:href="@{/}">Start Bootstrap</a>

      <!-- Collapsible Navbar Content -->
      <div class="collapse navbar-collapse" id="navLinks">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" th:href="@{/products}">Products</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/subcategories}">Subcategories</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/brands}">Brands</a></li>
        </ul>
      </div>

      <!-- Cart and Authentication -->
      <div class="d-flex align-items-center">
        <form class="d-flex me-3">
          <button class="btn btn-outline-dark" type="submit">
            <i class="bi-cart-fill me-1"></i>
            Cart
            <span class="badge bg-dark text-white ms-1 rounded-pill">0</span>
          </button>
        </form>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-primary me-2">Log In</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/registration}" class="btn btn-primary">Register</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/profile}" class="btn btn-outline-primary me-2">
          Welcome, <span sec:authentication="name"></span>
        </a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display: inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn btn-primary">Sign Out</button>
        </form>
      </div>
    </div>
  </nav>
</th:block>

</html>
