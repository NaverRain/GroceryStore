<nav th:fragment="pagination(basePath)" th:with="q=${queryString ?: ''}" aria-label="Pagination">
    <ul class="pagination justify-content-center">

        <!-- Previous -->
        <li class="page-item" th:classappend="${activePage == 1} ? 'disabled'">
            <a class="page-link shadow-none"
               th:href="@{${basePath} + '?page=' + (${activePage - 2}) + ${q}}">
                Previous
            </a>
        </li>

        <!-- Numbers -->
        <li class="page-item"
            th:each="pageNum : ${#numbers.sequence(1, pages)}"
            th:classappend="${pageNum == activePage} ? 'active'">

            <a class="page-link shadow-none"
               th:href="@{${basePath} + '?page=' + (${pageNum - 1}) + ${q}}"
               th:text="${pageNum}">
            </a>
        </li>

        <!-- Next -->
        <li class="page-item"
            th:classappend="${activePage == pages} ? 'disabled'">

            <a class="page-link shadow-none"
               th:href="@{${basePath} + '?page=' + ${activePage} + ${q}}">
                Next
            </a>
        </li>

    </ul>
</nav>
