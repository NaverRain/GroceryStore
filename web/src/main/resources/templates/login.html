<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Login - Grocery Store</title>
    <!-- Use main CSS imports to match site style -->
    <div th:replace="~{fragments/homepage-css-imports.html}"></div>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>
        <form th:action="@{/perform_login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <div class="text-right mb-3">
                <a th:href="@{/forgot-password}" class="text-muted small">Forgot password?</a>
            </div>

            <button type="submit" class="btn-auth">Login</button>

            <!-- Alerts -->
            <div th:if="${param.error}" class="alert alert-danger mt-3">
                Invalid username and password.
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger mt-3">
                <p th:text="${errorMessage}"></p>
            </div>
            <div th:if="${logoutMessage}" class="alert alert-success mt-3">
                <p th:text="${logoutMessage}"></p>
            </div>

            <div class="auth-footer-text">
                <span>Or Sign Up Using</span>
            </div>

            <div class="social-login">
                <a th:href="@{/oauth2/authorization/facebook}" class="social-item bg-fb">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a th:href="@{/oauth2/authorization/microsoft}" class="social-item bg-ms">
                    <i class="fab fa-windows"></i>
                </a>
                <a th:href="@{/oauth2/authorization/google}" class="social-item bg-go">
                    <i class="fab fa-google"></i>
                </a>
            </div>

            <div class="auth-footer-text mt-4">
                <span>Don't have an account?</span>
                <a th:href="@{/registration}">Sign Up</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
