<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Subcategories List</title>
  <div th:replace="~{fragments/homepage-css-imports.html}"></div>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>


<div class="container mt-4">
  <h2 class="text-center mb-4">Subcategories</h2>

  <!-- Subcategory Grid -->
  <div class="row">
    <div class="col-md-4 mb-4" th:each="subcategory : ${subcategories}">
      <div class="card h-100 shadow-sm">
        <img th:src="${subcategory.imageUrl}" class="card-img-top product-card-img" th:alt="${subcategory.name}">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title" th:text="${subcategory.name}"></h5>
          <p class="card-text text-muted" th:text="${subcategory.description}"></p>
          <div class="mt-auto">
             <a th:href="@{/subcategories/{id}/products(id=${subcategory.id})}" class="btn btn-primary btn-block">View Products</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <p th:if="${#lists.isEmpty(subcategories)}" class="text-center text-muted mt-3">No subcategories found.</p>

  <!-- Pagination -->
  <div th:if="${pages > 1}" th:replace="~{fragments/pagination :: pagination(${basePath})}"></div>
</div>

  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/homepage-js-imports.html}"></div>
</body>
</html>
